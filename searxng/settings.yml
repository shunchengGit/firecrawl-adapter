use_default_settings: true

general:
  instance_name: "hermes-search"
  debug: false
  privacypolicy_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

server:
  secret_key: "hermes-searxng-local"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false
  method: "GET"

ui:
  static_use_hash: true
  default_theme: simple
  default_locale: ""

# 引擎选择：国内直连优先 + 国际走代理，禁用被墙/不可用的
# weight 越大越优先（结果排前面）
engines:
  # 国内引擎（优先）
  - name: baidu
    disabled: false
    timeout: 15.0
    weight: 2
  - name: sogou
    disabled: false
    timeout: 15.0
    weight: 2
  - name: 360search
    disabled: false
    timeout: 15.0
    weight: 2

  # 国际引擎（走代理）
  - name: bing
    disabled: false
    timeout: 15.0
    weight: 1
  - name: google
    disabled: false
    timeout: 20.0
    weight: 1
  - name: duckduckgo
    disabled: false
    timeout: 15.0
    weight: 1
  - name: wikipedia
    disabled: false
    timeout: 10.0
    weight: 1

  # 直连可用引擎（无需代理也能跑，备选）
  - name: yandex
    disabled: false
    timeout: 15.0
    weight: 1
  - name: presearch
    disabled: false
    timeout: 15.0
    weight: 1
  - name: mojeek
    disabled: false
    timeout: 15.0
    weight: 1

  # 禁用：被墙 / HTTP错误 / 无结果 / 太慢
  - name: brave
    disabled: true
  - name: startpage
    disabled: true
  - name: qwant
    disabled: true
  - name: wikidata
    disabled: true
  - name: yahoo
    disabled: true
  - name: aol
    disabled: true
  - name: seznam
    disabled: true
  - name: naver
    disabled: true

outgoing:
  request_timeout: 20.0
  max_request_timeout: 30.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 10
  enable_http2: false
  # 全局代理：容器内 → host.docker.internal → 宿主代理 (7890)
  proxies:
    http: "http://host.docker.internal:7890"
    https: "http://host.docker.internal:7890"
