use_default_settings: true

general:
  instance_name: "hermes-search"
  debug: false
  privacypolicy_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

server:
  secret_key: "hermes-searxng-local"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false
  method: "GET"

ui:
  static_use_hash: true
  default_theme: simple
  default_locale: ""

# 只保留可靠引擎，显式禁用默认开启的其他引擎
# weight 越大越优先（结果排前面），国内引擎权重更高
engines:
  # 国内引擎（优先）
  - name: baidu
    timeout: 15.0
    weight: 2
  - name: sogou
    timeout: 15.0
    weight: 2

  # 国际引擎
  - name: bing
    timeout: 20.0
    weight: 1
  - name: google
    timeout: 20.0
    weight: 1
  - name: duckduckgo
    timeout: 15.0
    weight: 1
  - name: wikipedia
    timeout: 10.0
    weight: 1

  # 禁用默认开启但我们不需要的引擎（避免超时风暴）
  - name: brave
    disabled: true
  - name: startpage
    disabled: true
  - name: qwant
    disabled: true
  - name: yandex
    disabled: true
  - name: presearch
    disabled: true
  - name: wikidata
    disabled: true
  - name: yahoo
    disabled: true
  - name: mojeek
    disabled: true

outgoing:
  request_timeout: 20.0
  max_request_timeout: 30.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 6
  enable_http2: false
