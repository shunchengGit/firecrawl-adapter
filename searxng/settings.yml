use_default_settings: true

general:
  instance_name: "hermes-search"
  debug: false
  privacypolicy_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

server:
  secret_key: "hermes-searxng-local"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false
  method: "GET"

ui:
  static_use_hash: true
  default_theme: simple
  default_locale: ""

# 引擎选择：8个稳定引擎，去掉持续 CAPTCHA 的百度/搜狗
engines:
  # 国内引擎
  - name: 360search
    disabled: false
    timeout: 15.0

  # 国际引擎（走代理）
  - name: bing
    disabled: false
    timeout: 15.0
  - name: google
    disabled: false
    timeout: 20.0
  - name: duckduckgo
    disabled: false
    timeout: 15.0
  - name: wikipedia
    disabled: false
    timeout: 10.0

  # 直连可用
  - name: yandex
    disabled: false
    timeout: 15.0
  - name: presearch
    disabled: false
    timeout: 15.0
  - name: mojeek
    disabled: false
    timeout: 15.0

  # 持续 CAPTCHA/被墙/不可用
  - name: baidu
    disabled: true
  - name: sogou
    disabled: true
  - name: brave
    disabled: true
  - name: startpage
    disabled: true
  - name: qwant
    disabled: true
  - name: wikidata
    disabled: true
  - name: yahoo
    disabled: true
  - name: aol
    disabled: true
  - name: seznam
    disabled: true
  - name: naver
    disabled: true

outgoing:
  request_timeout: 20.0
  max_request_timeout: 30.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 8
  enable_http2: false
  # 全局代理：容器内 → host.docker.internal → 宿主代理 (7890)
  proxies:
    http: "http://host.docker.internal:7890"
    https: "http://host.docker.internal:7890"
